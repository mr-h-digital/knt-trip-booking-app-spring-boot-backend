# ── Server ────────────────────────────────────────────────────────────────────
server.port=${PORT:8080}

# ── Local dev profile ─────────────────────────────────────────────────────────
# Copy application-local.properties.example → application-local.properties
# and fill in your Railway credentials to run locally against the hosted DB.
# Run with: mvn spring-boot:run -Dspring-boot.run.profiles=local
spring.config.import=optional:classpath:application-local.properties

# ── DataSource ────────────────────────────────────────────────────────────────
# Railway exposes individual PG* vars — we build the JDBC URL from them.
# Override by setting JDBC_DATABASE_URL directly if preferred.
spring.datasource.url=${JDBC_DATABASE_URL:jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:knt_db}}
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── Connection pool (Railway free tier caps connections at ~25) ───────────────
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ── JPA ───────────────────────────────────────────────────────────────────────
# validate = safe for production; Flyway manages schema changes
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false

# ── JWT ───────────────────────────────────────────────────────────────────────
# Override JWT_SECRET in Railway env vars with a long random Base64 string
app.jwt.secret=${JWT_SECRET:please-change-this-secret-in-production-it-must-be-at-least-256-bits}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ── File uploads (avatars stored locally — replace with S3/cloud on prod) ─────
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
app.upload.dir=${UPLOAD_DIR:uploads}

# ── Actuator (Railway health checks) ─────────────────────────────────────────
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# ── CORS (permit the Railway-deployed front-end and local emulator) ────────────
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://10.0.2.2,http://localhost}
