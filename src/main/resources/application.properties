# ── Server ────────────────────────────────────────────────────────────────────
server.port=${PORT:8080}

# ── DataSource (Railway injects DATABASE_URL automatically) ───────────────────
spring.datasource.url=${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA ───────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ── JWT ───────────────────────────────────────────────────────────────────────
# Override JWT_SECRET in Railway env vars with a long random Base64 string
app.jwt.secret=${JWT_SECRET:please-change-this-secret-in-production-it-must-be-at-least-256-bits}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ── File uploads (avatars stored locally — replace with S3/cloud on prod) ─────
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
app.upload.dir=${UPLOAD_DIR:uploads}

# ── Actuator (Railway health checks) ─────────────────────────────────────────
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# ── CORS (permit the Railway-deployed front-end and local emulator) ────────────
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://10.0.2.2,http://localhost}
