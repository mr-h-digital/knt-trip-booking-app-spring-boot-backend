# ── Production profile (Railway) ─────────────────────────────────────────────
# Activated automatically when SPRING_PROFILES_ACTIVE=prod is set.
# Overrides the base application.properties values below.

# ── JPA — update creates tables on first run; switch to validate once stable ──
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ── Logging — reduce noise in production ──────────────────────────────────────
logging.level.root=WARN
logging.level.com.kntransport=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=WARN

# ── Actuator — expose only health, never show stack details ───────────────────
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true

# ── Multipart — tighten upload limits ─────────────────────────────────────────
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
